<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japfa Feed - Sales (Mockup)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- QUAN TRONG: nap Tailwind CDN TRUOC, roi moi set config (theme.js) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./assets/theme.js"></script>
  <style>
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
  </style>
</head>
<body class="bg-ink-100 font-sans text-ink-900 h-screen flex flex-col overflow-hidden">

  <!-- ===== TOP BAR ===== -->
  <header class="h-14 bg-white border-b border-ink-300 flex items-center px-3 gap-3 shrink-0 z-20">
    <button id="btnCollapse" class="h-8 w-8 grid place-items-center rounded hover:bg-ink-100 text-ink-500" title="Thu gọn menu">
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m11 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/></svg>
    </button>
    <div class="flex items-center gap-2">
      <div class="h-8 w-8 rounded-lg bg-brand-500 grid place-items-center text-white font-bold text-sm">J</div>
      <span class="font-semibold text-[15px]">Japfa Feed - Sales</span>
    </div>
    <div class="flex-1"></div>
    <div class="ml-auto flex items-center gap-1 text-ink-500">
      <button class="h-8 w-8 grid place-items-center rounded hover:bg-ink-100" title="Ngôn ngữ">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8h9M9 4v4m1.5 0c0 4-2.5 8-6.5 9M7 12c0 3 3 5 7 6"/><path d="m13 20 4-9 4 9M14.5 17h5"/></svg>
      </button>
      <button class="h-8 w-8 grid place-items-center rounded hover:bg-ink-100" title="Dạng lưới">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== BODY: 3 COT ===== -->
  <div class="flex-1 flex overflow-hidden">
    <!-- SIDEBAR TRAI -->
    <aside id="sidebar" class="w-60 bg-white border-r border-ink-300 flex flex-col shrink-0 transition-all">
      <div class="p-3 space-y-1 border-b border-ink-100">
        <button class="w-full flex items-center justify-between gap-2 text-sm px-2 py-1.5 rounded hover:bg-ink-100">
          <span class="truncate min-w-0"><span class="text-ink-500">Nhóm:</span> <span class="font-semibold text-brand-600">SALE</span></span>
          <svg class="h-4 w-4 text-ink-300 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <button class="w-full flex items-center justify-between gap-2 text-sm px-2 py-1.5 rounded hover:bg-ink-100">
          <span class="truncate min-w-0"><span class="text-ink-500">Nhà máy:</span> <span class="font-medium text-brand-600">FM HƯƠNG CANH</span></span>
          <svg class="h-4 w-4 text-ink-300 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </button>
      </div>
      <nav id="menu" class="flex-1 overflow-y-auto p-2 space-y-0.5 text-sm"></nav>
      <div class="p-3 border-t border-ink-100 flex items-center gap-2 text-sm text-ink-500">
        <span class="h-7 w-7 rounded-full bg-brand-500 grid place-items-center text-white shrink-0">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>
        </span>
        Tải phiên bản mobile
        <svg class="h-4 w-4 ml-auto text-ink-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      </div>
    </aside>

    <!-- NOI DUNG GIUA (router mount) -->
    <main id="view" class="flex-1 flex flex-col overflow-hidden bg-white"></main>

    <!-- PANEL PHAI (router co the hien/an) -->
    <aside id="filterPanel" class="w-72 bg-white border-l border-ink-300 flex-col shrink-0 hidden"></aside>
  </div>

  <script src="./assets/mock-data.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
