<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lich su dat hang - Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="../assets/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Du lieu mock tinh - KHONG goi API -->
  <script src="../assets/mock-data.js"></script>
</head>
<body class="bg-ink-100 font-sans text-ink-900">
  <header class="bg-white border-b border-ink-300">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-3">
      <a href="../index.html" class="text-sm text-brand-600 hover:text-brand-700">&larr; Design system</a>
      <span class="text-ink-300">/</span>
      <h1 class="font-semibold">Lich su dat hang khach hang</h1>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8 space-y-6">

    <!-- Bo loc: map tu GET /api/Share/GetOrderPlacement?from_date&to_date -->
    <section class="bg-white rounded-card shadow-card p-5">
      <div class="grid sm:grid-cols-3 gap-4 items-end">
        <div>
          <label class="block text-sm font-medium mb-1">Tu ngay</label>
          <input id="fromDate" type="date" value="2025-01-01"
            class="w-full px-3 py-2 rounded-lg border border-ink-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-200 outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Den ngay</label>
          <input id="toDate" type="date" value="2025-01-31"
            class="w-full px-3 py-2 rounded-lg border border-ink-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-200 outline-none" />
        </div>
        <button onclick="renderRows()" class="px-4 py-2 rounded-lg bg-brand-500 text-white font-medium hover:bg-brand-600 transition">Loc don hang</button>
      </div>
    </section>

    <!-- Tong hop: map tu OrderQtyRevenueDTO -->
    <section id="summary" class="grid sm:grid-cols-3 gap-4"></section>

    <!-- Bang: map tu List<OrderPlacementDTO> -->
    <section class="bg-white rounded-card shadow-card overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-ink-100 text-ink-500 text-left">
          <tr>
            <th class="px-4 py-3 font-medium">Ma SO</th>
            <th class="px-4 py-3 font-medium">Ngay dat</th>
            <th class="px-4 py-3 font-medium">Ngay du kien</th>
            <th class="px-4 py-3 font-medium">Ngay lay thuc te</th>
            <th class="px-4 py-3 font-medium">Trang thai</th>
          </tr>
        </thead>
        <tbody id="rows" class="divide-y divide-ink-100"></tbody>
      </table>
    </section>
  </main>

  <script>
    // Lay du lieu tu mock-data.js (KHONG goi API)
    const badge = (s) => ({
      success: "bg-success/10 text-success",
      warning: "bg-warning/10 text-warning",
      danger:  "bg-danger/10 text-danger",
    }[s] || "bg-brand-50 text-brand-700");

    const fmt = (d) => d ? d : '<span class="text-ink-300">&mdash;</span>';
    const card = (label, value) => `
      <div class="bg-white rounded-card shadow-card p-5">
        <p class="text-sm text-ink-500">${label}</p>
        <p class="text-2xl font-bold">${value}</p>
      </div>`;

    function renderSummary() {
      const s = MockData.orderQtyRevenueSummary;
      document.getElementById("summary").innerHTML =
        card("So don hang", s.OrderCount) +
        card("San luong (tan)", s.AccumulatedQuantity) +
        card("So tien (trieu d)", s.AccumulatedAmount.toLocaleString("vi-VN"));
    }

    function renderRows() {
      document.getElementById("rows").innerHTML = MockData.orderPlacement.map((r) => `
        <tr class="hover:bg-ink-100/60">
          <td class="px-4 py-3 font-medium">${r.so_code}</td>
          <td class="px-4 py-3">${fmt(r.order_date_creation)}</td>
          <td class="px-4 py-3">${fmt(r.ordered_date)}</td>
          <td class="px-4 py-3">${fmt(r.so_date)}</td>
          <td class="px-4 py-3"><span class="px-2.5 py-1 rounded-full text-xs font-medium ${badge(r._status)}">${r.so_status_name}</span></td>
        </tr>`).join("");
    }

    renderSummary();
    renderRows();
  </script>
</body>
</html>
